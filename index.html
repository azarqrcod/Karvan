<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karvan Interior Design</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: url('karvan-interior-background.png') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* کل صفحه بدون تار */
.wrapper {
    text-align: center;
    width: 100%;
    max-width: 420px;
}

/* لوگو */
.logo {
    width: 140px;
    margin-bottom: 15px;
}

/* فقط این باکس بلوری */
.glass-box {
    padding: 25px 15px;
    border-radius: 25px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.08);
}

/* متن */
h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

.subtitle {
    margin-bottom: 20px;
    opacity: 0.9;
}

/* دکمه‌ها */
.btn {
    display: block;
    margin: 10px 0;
    padding: 14px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
}

/* متن پایین */
.footer {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.9;
}

/* دکمه اصلی */
.cta {
    width: 60%;
    margin: 20px auto 0;
    padding: 10px;
    border-radius: 25px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.2);
    font-weight: bold;
}

/* متن تبلیغ */
.brand {
    margin-top: 12px;
    font-size: 13px;
    opacity: 0.85;
}
</style>

</head>

<body>

<div class="wrapper">

<img src="logo-karvan.PNG" class="logo">

<div class="glass-box">
