<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karvan Interior Design</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    background:url('karvan-interior-background.png') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
}

/* Layout */
.wrapper{
    width:100%;
    max-width:420px;
    text-align:center;
}

/* Logo */
.logo{
    width:150px;
    margin-bottom:15px;
}

/* Glass container (real blur behind) */
.glass{
    position:relative;
    padding:25px 15px;
    border-radius:25px;
    overflow:hidden;
}

.glass::before{
    content:'';
    position:absolute;
    inset:0;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.06);
    border-radius:25px;
    z-index:0;
}

.content{
    position:relative;
    z-index:1;
}

/* Text */
h1{
    font-size:28px;
    margin-bottom:10px;
}

.subtitle{
    margin-bottom:20px;
    opacity:0.95;
}

/* Buttons */
.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:30px;
    text-decoration:none;
    color:#fff;
    background: rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition:0.25s;
}

.btn:hover{
    background: rgba(255,255,255,0.25);
    transform:scale(1.04);
}

/* Footer */
.footer{
    margin-top:15px;
    font-size:14px;
    opacity:0.9;
}

/* CTA */
.cta{
    width:60%;
    margin:20px auto 0;
    padding:10px;
    font-weight:bold;
}

/* Brand line */
.brand{
    margin-top:12px;
    font-size:13px;
    opacity:0.85;
}
</style>
</head>

<body>

<div class="wrapper">

<img src="logo-karvan.PNG" class="logo" alt="Karvan Logo">

<div class="glass">
<div class="content">

<h1>Willkommen</h1>
<p class="subtitle">Vielen Dank, dass Sie uns gewählt haben</p>

<a href="https://wa.me/4917672161005" class="btn">WhatsApp</a>
<a href="https://www.instagram.com/karvaninteriordesign" class="btn">Instagram</a>
<a href="mailto:Info@karvan-design.de" class="btn">E-Mail</a>
<a href="https://maps.google.com/?q=Pepitapromenade+37,+13587+Berlin" class="btn">Adresse anzeigen</a>

<div class="footer">
Wir verwandeln Räume in stilvolle Lebenswelten.<br>
Modern. Präzise. Hochwertig.
</div>

<a href="mailto:azarqrcod@gmail.com?subject=Neues Projekt Karvan" class="btn cta">
Azar Digital
</a>

<p class="brand">
Azar Digital – sichtbar. professionell. wirksam.
</p>

</div>
</div>

</div>

</body>
</html>
