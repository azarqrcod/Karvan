<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karvan Interior Design</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    background:url('karvan-interior-background.png') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    position:relative;
    overflow:hidden;
}

/* لایه بلور کل صفحه */
.blur-layer{
    position:absolute;
    inset:0;
    backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.15);
    z-index:0;
}

/* ساختار */
.wrapper{
    position:relative;
    z-index:2;
    width:100%;
    max-width:420px;
    text-align:center;
}

/* لوگو (روی بلور) */
.logo{
    width:150px;
    margin-bottom:20px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
    100%{transform:translateY(0)}
}

/* باکس */
.glass{
    padding:25px 15px;
    border-radius:25px;
    background: rgba(255,255,255,0.08);
}

/* متن */
h1{
    font-size:28px;
    margin-bottom:10px;
}

.subtitle{
    margin-bottom:20px;
}

/* دکمه‌ها */
.btn{
    display:block;
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:30px;
    text-decoration:none;
    color:#fff;
    background: rgba(255,255,255,0.18);
    border:1px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(8px);
    transition:0.3s;
}

/* hover */
.btn:hover{
    transform:scale(1.05);
    background: rgba(255,255,255,0.35);
}

/* CTA */
.cta{
    width:60%;
    margin:20px auto 0;
    padding:10px;
    font-weight:bold;
}

/* متن پایین */
.footer{
    margin-top:15px;
    font-size:14px;
}

.brand{
    margin-top:12px;
    font-size:13px;
}
</style>

</head>

<body>

<!-- لایه بلور -->
<div class="blur-layer"></div>

<div class="wrapper">

<img src="logo-karvan.PNG" class="logo">

<div class="glass">

<h1>Willkommen</h1>
<p class="subtitle">Vielen Dank, dass Sie uns gewählt haben</p>

<a href="https://wa.me/4917672161005" class="btn">WhatsApp</a>
<a href="https://www.instagram.com/karvaninteriordesign" class="btn">Instagram</a>
<a href="mailto:Info@karvan-design.de" class="btn">E-Mail</a>
<a href="https://maps.google.com/?q=Pepitapromenade+37,+13587+Berlin" class="btn">Adresse anzeigen</a>

<div class="footer">
Wir verwandeln Räume in stilvolle Lebenswelten.<br>
Modern. Präzise. Hochwertig.
</div>

<a href="mailto:azarqrcod@gmail.com?subject=Neues Projekt Karvan" class="btn cta">
Azar Digital
</a>

<p class="brand">
Azar Digital – sichtbar. professionell. wirksam.
</p>

</div>

</div>

</body>
</html>
