<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karvan Interior Design</title>

<style>
:root{
    --glass-bg: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.25);
    --text-main: #ffffff;
}

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

/* Background */
body{
    height:100vh;
    background:url('karvan-interior-background.png') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--text-main);
    position:relative;
}

/* Global blur layer */
.blur-layer{
    position:absolute;
    inset:0;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.15);
    z-index:0;
}

/* Wrapper */
.wrapper{
    position:relative;
    z-index:2;
    width:100%;
    max-width:420px;
    padding:16px;
    text-align:center;
}

/* Logo */
.logo{
    width:150px;
    margin-bottom:18px;
    animation: float 4s ease-in-out infinite;
}

/* Motion respect */
@media (prefers-reduced-motion: reduce){
    .logo{ animation:none; }
}

/* Logo animation */
@keyframes float{
    0%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
    100%{ transform:translateY(0); }
}

/* Glass card */
.card{
    position:relative;
    border-radius:24px;
    padding:24px 18px;
    overflow:hidden;
}

/* real glass */
.card::before{
    content:'';
    position:absolute;
    inset:0;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.06);
    border-radius:24px;
    z-index:0;
}

/* fallback */
@supports not (backdrop-filter: blur(10px)){
    .card::before{
        background: rgba(0,0,0,0.45);
    }
}

.content{
    position:relative;
    z-index:1;
}

/* Text */
h1{
    font-size:28px;
    margin-bottom:8px;
}

.subtitle{
    font-size:15px;
    opacity:0.9;
    margin-bottom:20px;
}

/* Buttons */
.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:28px;
    text-decoration:none;
    color:#fff;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    transition: all 0.25s ease;
}

/* Hover */
.btn:hover{
    transform: translateY(-2px) scale(1.03);
    background: rgba(255,255,255,0.28);
}

/* Focus accessibility */
.btn:focus-visible{
    outline:2px solid #fff;
    outline-offset:3px;
}

/* CTA */
.cta{
    width:65%;
    margin:22px auto 0;
    font-weight:600;
}

/* Footer */
.footer{
    margin-top:14px;
    font-size:14px;
    opacity:0.9;
    line-height:1.4;
}

/* Brand line */
.brand{
    margin-top:12px;
    font-size:13px;
    opacity:0.8;
}
</style>
</head>
